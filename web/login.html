<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICEvirtue - Login</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 2.5rem;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            color: #58a6ff;
            font-size: 1.5rem;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.2rem;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #2ea043;
        }
        button:active {
            transform: scale(0.98);
        }
        .error {
            color: #f85149;
            margin-bottom: 1rem;
            font-size: 0.9em;
            display: none;
            background: rgba(248, 81, 73, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(248, 81, 73, 0.4);
        }
        .spinner {
            display: none;
            margin: 10px auto;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ICEvirtue Engine</h2>
    <div class="error" id="error-msg">Unauthorized</div>
    <form id="login-form">
        <input type="text" id="username" placeholder="Username" required autocomplete="username">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" id="submit-btn">Sign In</button>
        <div class="spinner" id="spinner"></div>
    </form>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('error-msg');

        submitBtn.style.display = 'none';
        spinner.style.display = 'block';
        errorMsg.style.display = 'none';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                // Remove the hash and reload to fetch template.html
                window.location.replace('/'); 
            } else {
                errorMsg.textContent = "Unauthorized"; // Generic message as required
                errorMsg.style.display = 'block';
                submitBtn.style.display = 'block';
                spinner.style.display = 'none';
            }
        } catch (err) {
            errorMsg.textContent = "Connection error";
            errorMsg.style.display = 'block';
            submitBtn.style.display = 'block';
            spinner.style.display = 'none';
        }
    });
</script>

</body>
</html>
